spring.datasource.url=jdbc:h2:mem:paper_reviewer_${random.uuid};MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/paper_reviewer.sql
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.type-handlers-package=com.paper.reviewer.common.persistence
app.jwt.secret=paper-reviewer-test-secret-that-is-at-least-32-bytes
app.jwt.expiration-minutes=60
spring.ai.model.chat=none
spring.ai.openai.chat.model=qwen-test
